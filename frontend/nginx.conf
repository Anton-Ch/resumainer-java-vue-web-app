# =============================================================================
# ResumAIner Frontend — Nginx Configuration
# =============================================================================
# Serves the Vue SPA static build under /app/..., proxies /api/ to backend.
# Root / goes to backend for the Thymeleaf landing page.
# =============================================================================

server {
    listen 80;
    server_name localhost;

    # Root directory for built SPA assets
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy same-origin;

    # API proxy — forward /api/* requests to backend
    # proxy_read_timeout increased to 300s because OpenRouter AI generation
    # can take 1-4 minutes. Default 60s causes 504 Gateway Time-out.
    location /api/ {
        proxy_pass http://resumainer-app:8080;
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
    }

    # SPA — serve Vue app under /app/ with history fallback
    location /app/ {
        alias /usr/share/nginx/html/app/;
        autoindex off;
        try_files $uri /app/index.html;
    }

    # Root — proxy to backend for Thymeleaf landing page
    location / {
        proxy_pass http://resumainer-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
