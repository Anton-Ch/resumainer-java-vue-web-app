# ================================================================
# ResumAIner Backend — Application Configuration
# ================================================================
spring.application.name=ResumAIner

# Active profile
# In pure Spring MVC (without Boot), profiles must be set directly.
# Override by changing this value or using a custom initializer.
spring.profiles.active=dev

# Server port (override via SERVER_PORT env var)
server.port=${SERVER_PORT:8080}

# Encoding
spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true

# Landing Page CTA target (externalized per SEC-001)
landing.cta.url=/auth/login

# Error handling — never expose stack traces to the client
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false

# ================================================================
# Database — PostgreSQL (dev profile)
# ================================================================
# Custom Connection Pool reads these values via @Value
db.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resumainer}
db.user=${DB_USER:resumainer}
db.password=${DB_PASSWORD:resumainer_dev}
db.driver=org.postgresql.Driver

# Connection pool settings
db.pool.initial-size=2
db.pool.max-size=10
db.pool.timeout-ms=30000

# Flyway (auto-migration on startup)
flyway.enabled=true
flyway.locations=classpath:db/migration
