# --- FAQ ---
faq.title=Questions before you start
faq.q1=Is ResumAIner a resume builder?
faq.q1.a=Yes, but it is more focused than a classic resume builder. It helps you adapt resumes for specific vacancies using one structured profile.
faq.q2=Can I edit AI-assisted resume drafts?
faq.q2.a=Yes. You review and edit the resume before saving the final version.
faq.q3=Can it make cover letters?
faq.q3.a=Yes. ResumAIner can prepare cover letter drafts based on your profile and the target vacancy.
faq.q4=Does it support English and Russian resumes?
faq.q4.a=Yes. You can make resume versions in English, Russian, or both.
faq.q5=Does the interface support English and Russian?
faq.q5.a=Yes. The UI supports both English and Russian.
faq.q6=Can I download resumes as PDF?
faq.q6.a=Yes. You can download a polished, print-friendly PDF.
faq.q7=Can I share a resume with recruiters using a public link?
faq.q7.a=Yes. You can create a public link and send it to a recruiter.
faq.q8=Does AI publish or send anything automatically?
faq.q8.a=No. You stay in control. Nothing is final until you review and save it.
faq.q9=Why use this instead of a normal AI chat?
faq.q9.a=Because your career data is stored once in a structured profile. You do not need to rebuild the same context every time.

