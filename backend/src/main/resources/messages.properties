# --- Problem Section ---
problem.title=Resume adaptation should not feel like starting from zero every time.
problem.subtitle=Every serious application needs a focused resume. But rewriting, translating, and tracking versions manually quickly becomes slow, repetitive, and messy.
problem.card1.title=Manual tailoring takes hours
problem.card1.desc=Rewriting a resume for every vacancy is slow and mentally draining.
problem.card2.title=Career data is scattered
problem.card2.desc=Experience, skills, projects, and achievements live across files, LinkedIn, old resumes, and memory.
problem.card3.title=Translation doubles the work
problem.card3.desc=When you need English and Russian versions, you must translate, compare, and keep both consistent.
problem.card4.title=AI chats repeat the same setup
problem.card4.desc=Without a structured profile, every AI session starts with the same context-building work.
problem.card5.title=Resume versions become messy
problem.card5.desc=It becomes hard to remember which resume was sent to which company.

