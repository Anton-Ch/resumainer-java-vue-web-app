# ================================================================
# Production profile — container deployment
# DB config read from environment variables (set in docker-compose)
# ================================================================
logging.level.com.resumainer=INFO
logging.level.org.springframework=WARN

# Database — PostgreSQL (prod profile, configured via env vars)
# In Docker, DB_HOST=db (service name), DB_PORT=5432, etc.
db.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME:resumainer}
db.user=${DB_USER}
db.password=${DB_PASSWORD}
db.driver=org.postgresql.Driver

# Connection pool settings
db.pool.initial-size=2
db.pool.max-size=10
db.pool.timeout-ms=30000

# Flyway (auto-migration on startup)
flyway.enabled=true
flyway.locations=classpath:db/migration
