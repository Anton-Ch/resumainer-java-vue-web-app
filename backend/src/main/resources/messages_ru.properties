# --- FAQ ---
faq.title=Часто задаваемые вопросы
faq.q1=ResumAIner — это конструктор резюме?
faq.q1.a=Скорее нет. Это инструмент для адаптации резюме под конкретные вакансии на основе одного профиля. Не шаблонный генератор, а умный помощник для целевых откликов.
faq.q2=Можно ли править формулировки от ИИ?
faq.q2.a=Да. Можно посмотреть и отредактировать резюме перед сохранением.
faq.q3=Он умеет писать сопроводительные письма?
faq.q3.a=Да. ResumAIner готовит черновик сопроводительного письма под конкретную вакансию на основе всего контекста.
faq.q4=Резюме можно сделать на русском?
faq.q4.a=Да. Можно готовить версии на английском, на русском или сразу на двух языках.
faq.q5=Интерфейс тоже поддерживает русский и английский?
faq.q5.a=Да. Интерфейс полностью переключается между русским и английским.
faq.q6=Можно скачать резюме в PDF?
faq.q6.a=Да. Скачивается аккуратный PDF с читаемым текстом и готовый к печати.
faq.q7=Можно отправить резюме рекрутеру по ссылке?
faq.q7.a=Да. Ссоздаётся публичная ссылка, которую сразу можно отправить рекрутеру.
faq.q8=ИИ может что-то опубликовать или отправить сам?
faq.q8.a=Нет. Всё остаётся под твоим полным контролем. Ничего не создастся без твоего подтверждения.
faq.q9=Зачем это, если есть обычный чат с ИИ?
faq.q9.a=Потому что твои точные данные записываются один раз и хранятся в структурированном профиле. Не нужно каждый раз объяснять контекст заново.

