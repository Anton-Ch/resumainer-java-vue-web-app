# --- Problem Section ---
problem.title=Не переделывай резюме каждый раз с нуля в ручную.
problem.subtitle=Для серьёзного отклика нужно сильное резюме. Но переписывать, переводить и отслеживать версии вручную это долго, утомительно и легко запутаться.
problem.card1.title=Ручные правки часами
problem.card1.desc=Переделывать резюме под каждую вакансию — долго и морально выматывает.
problem.card2.title=Опыт и навыки разбросаны
problem.card2.desc=Опыт, проекты и достижения хранятся в разных местах, LinkedIn, старые резюме и в голове.
problem.card3.title=Перевод удваивает работу
problem.card3.desc=Когда нужны английская и русская версии, приходится сверять и сопоставлять каждую правку.
problem.card4.title=Повтор ИИ чатам одного и того же
problem.card4.desc=Без единого профиля каждый новый диалог с ИИ начинается с нуля.
problem.card5.title=Версии путаются
problem.card5.desc=Cложно вспомнить, какое резюме и куда отправляли.

