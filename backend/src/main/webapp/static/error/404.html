<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — ResumAIner</title>
  <link rel="stylesheet" href="../css/landing.css">
  <style>
    body { display: grid; place-items: center; min-height: 80vh; text-align: center; padding: 2rem; }
    .error-code { font-family: var(--font-display); font-size: clamp(60px, 10vw, 120px); font-weight: 800; color: var(--color-emerald); margin: 0; line-height: 1; }
    h1 { margin-top: 1rem; }
    p { color: var(--color-ink-soft); margin: 1rem 0 2rem; }
    .btn-home { display: inline-flex; padding: 12px 28px; background: var(--color-emerald); color: var(--color-accent-on); border-radius: var(--radius); text-decoration: none; font-weight: 600; }
    .btn-home:hover { background: var(--color-emerald-dark); }
  </style>
</head>
<body>
  <div>
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="/" class="btn-home">Go to homepage</a>
  </div>
</body>
</html>
