<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumAIner — Home</title>
<style>
@font-face { font-family: 'Manrope'; src: url('mpvzg7zl-Manrope-800.ttf') format('truetype'); font-weight: 800; font-display: swap; }
@font-face { font-family: 'Inter'; src: url('mpvzg7xj-Inter-600.ttf') format('truetype'); font-weight: 600; font-display: swap; }
@font-face { font-family: 'Inter'; src: url('mpvzg7yf-Inter-700.ttf') format('truetype'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'Inter'; src: url('mpvzg80j-Inter-500.ttf') format('truetype'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'Inter'; src: url('mpvzg808-Inter-400.ttf') format('truetype'); font-weight: 400; font-display: swap; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F6F7FB; --surface: #FFFFFF; --text-primary: #10233F; --text-secondary: #5D718B; --text-muted: #8091A7;
  --border: #E4E9F1; --accent: #0F9D7A; --blue: #2F6BFF;
  --radius-card: 26px; --radius-btn: 14px;
  --shadow: 0 10px 30px rgba(16, 35, 63, 0.08);
  --font-display: 'Manrope', 'Inter', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
}
html, body { height: 100%; }
body {
  font-family: var(--font-body); background: var(--bg); color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}
.page {
  display: flex; flex-direction: column; min-height: 100vh;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; background: var(--surface);
  border-bottom: 1.4px solid var(--border);
}
.topbar-logo {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.topbar-logo svg { width: 28px; height: 28px; }
.topbar-logo span {
  font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px;
}
.topbar-right { display: flex; align-items: center; gap: 16px; }
.user-badge {
  font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text-secondary);
  padding: 6px 14px; background: #F0F2F5; border-radius: 20px;
}
.logout-btn {
  font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--blue);
  background: none; border: none; cursor: pointer; text-decoration: none;
  padding: 6px 14px; border-radius: 8px; transition: background 200ms ease;
}
.logout-btn:hover { background: #EEF4FF; text-decoration: underline; }
main {
  flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px;
}
.empty-state {
  text-align: center; max-width: 420px;
}
.empty-icon {
  width: 64px; height: 64px; margin: 0 auto 24px; color: var(--text-muted);
  opacity: 0.5;
}
h1 {
  font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--text-primary);
  margin-bottom: 12px;
}
.empty-text {
  font-family: var(--font-body); font-size: 15px; font-weight: 400; color: var(--text-secondary);
  line-height: 1.6; margin-bottom: 28px;
}
.placeholder-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px; background: var(--accent); color: #FFF; border: none;
  border-radius: var(--radius-btn); font-family: var(--font-body); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background 200ms ease; text-decoration: none;
}
.placeholder-btn:hover { background: #0C8467; box-shadow: 0 4px 12px rgba(15,157,122,0.3); }
</style>
</head>
<body>
<div class="page">
  <header class="topbar">
    <a class="topbar-logo" href="/">
      <svg viewBox="0 0 512 512" role="img" aria-label="ResumAIner">
        <rect x="24" y="24" width="464" height="464" rx="104" fill="#F6F7FB"/>
        <g transform="translate(96 68) scale(2.5)">
          <rect x="6" y="6" width="116" height="148" rx="18" fill="#FFFDF8" stroke="#10233F" stroke-width="8"/>
          <line x1="6" y1="112" x2="122" y2="112" stroke="#10233F" stroke-width="8" stroke-linecap="round"/>
          <circle cx="64" cy="62" r="30" fill="none" stroke="#10233F" stroke-width="6"/>
          <line x1="64" y1="20" x2="64" y2="34" stroke="#10233F" stroke-width="7" stroke-linecap="round"/>
          <line x1="64" y1="90" x2="64" y2="104" stroke="#10233F" stroke-width="7" stroke-linecap="round"/>
          <line x1="22" y1="62" x2="36" y2="62" stroke="#10233F" stroke-width="7" stroke-linecap="round"/>
          <line x1="92" y1="62" x2="106" y2="62" stroke="#10233F" stroke-width="7" stroke-linecap="round"/>
          <circle cx="64" cy="62" r="13" fill="#0F9D7A"/>
          <rect x="24" y="127" width="80" height="19" rx="5" fill="#0F9D7A"/>
        </g>
      </svg>
      <span>ResumAIner</span>
    </a>
    <div class="topbar-right">
      <span class="user-badge">User</span>
      <a class="logout-btn" href="auth.html">Log out</a>
    </div>
  </header>
  <main>
    <div class="empty-state">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <h1>User Home</h1>
      <p class="empty-text">
        Your saved resumes and profile management will appear here.<br>
        This is a placeholder page for the prototype.
      </p>
      <a class="placeholder-btn" href="auth.html">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2l4 6-4 6"/>
        </svg>
        Back to Auth
      </a>
    </div>
  </main>
</div>
<script>
  const saved = localStorage.getItem('resumainer_locale');
  const locale = saved || 'en';
  if (locale === 'ru') {
    document.querySelector('h1').textContent = 'Главная';
    document.querySelector('.empty-text').innerHTML = 'Ваши сохранённые резюме и управление профилем будут отображаться здесь.<br>Это страница-заглушка для прототипа.';
    document.querySelector('.logout-btn').textContent = 'Выйти';
    document.querySelector('.placeholder-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2l4 6-4 6"/></svg> Назад';
  }
</script>
</body>
</html>
