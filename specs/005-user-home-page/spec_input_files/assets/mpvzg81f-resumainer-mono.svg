<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">ResumAIner monochrome logo</title>
  <desc id="desc">Monochrome version of the ResumAIner logo using only ink color.</desc>
  <rect width="900" height="260" fill="none"/>
  
    <g transform="translate(42 38) scale(1.16)" vector-effect="non-scaling-stroke">
      <rect x="6" y="6" width="116" height="148" rx="18" fill="#FFFDF8" stroke="#17211D" stroke-width="8"/>
      <line x1="6" y1="112" x2="122" y2="112" stroke="#17211D" stroke-width="8" stroke-linecap="round"/>

      <circle cx="64" cy="62" r="30" fill="none" stroke="#17211D" stroke-width="6"/>
      <line x1="64" y1="20" x2="64" y2="34" stroke="#17211D" stroke-width="7" stroke-linecap="round"/>
      <line x1="64" y1="90" x2="64" y2="104" stroke="#17211D" stroke-width="7" stroke-linecap="round"/>
      <line x1="22" y1="62" x2="36" y2="62" stroke="#17211D" stroke-width="7" stroke-linecap="round"/>
      <line x1="92" y1="62" x2="106" y2="62" stroke="#17211D" stroke-width="7" stroke-linecap="round"/>
      <circle cx="64" cy="62" r="13" fill="#17211D"/>

