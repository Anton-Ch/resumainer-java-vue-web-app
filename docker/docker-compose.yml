# =============================================================================
# ResumAIner Backend — Docker Compose
# =============================================================================
# Starts the application server (Tomcat) and database (PostgreSQL).
# Required env vars (set in .env or environment):
#   - DB_PASSWORD: PostgreSQL password (required, no default)
#   - DB_USER:     PostgreSQL user (default: resumainer)
#   - SERVER_PORT: Tomcat HTTP port (default: 8080)
#   - SPRING_PROFILES_ACTIVE: Spring profile (default: dev)
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: resumainer-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: resumainer
      POSTGRES_USER: ${DB_USER:-resumainer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?error}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumainer"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: resumainer-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_PASSWORD: ${DB_PASSWORD:?error}
      DB_USER: ${DB_USER:-resumainer}
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
